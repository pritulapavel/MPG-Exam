<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="MPG Team">
    <meta name="description" content="This is Georgian Spotify Template created by MPG Team">
    <link rel="stylesheet" href="assets/styles/style.css">
    <title>Georgian Spotify - Project by MPG Team</title>
</head>
<body class="app">
    <header class="header">
        Header
    </header>
    <aside class="sidebar">
        Sidebar
    </aside>
    <main class="main">
        <div class="main-inner">
            <section class="section">Sections here</section>
            <section class="section">Sections here</section>
        </div>
    </main>
    <footer class="player">
        <div class="player-wrapper">
            <img src="./assets/img/alboms/albom_1.png" alt="Draft Punk">

            <div class="music-title-author-wrapper">
                <a href="#" class="scrolling-text">Get Lucky (feat. Pharrell Williams and Nile Rodgers)</a>
                <a href="#" class="scrolling-text-band">Draft Punk</a>
            </div>
        </div>

        <div class="player-icons">
            <img src="./assets/img/icons/player/add_playlist.svg" alt="add_playlist" class="add_playlist">
            <img src="./assets/img/icons/player/play.svg" alt="play" class="play">
        </div>

        <div class="music-progress-bar"></div>

        <div class="advanced-player">
            <div class="advanced-player-wrapper">
                <div class="stop-button-wrapper">
                    <img src="./assets/img/icons/player/pause.svg" alt="pause" class="pause">
                </div>
                <img src="./assets/img/icons/player/prev.svg" alt="prev">
                <img src="./assets/img/icons/player/next.svg" alt="next">
                <img src="./assets/img/icons/player/shuffle.svg" alt="shuffle">
                <img src="./assets/img/icons/player/repeat.svg" alt="repeat">
            </div>

            <div class="advanced-player-music-time-line">
                <p>2:23</p>
                <div class="advanced-music-progress-bar"></div>
                <p>4:46</p>
            </div>

            <img src="./assets/img/icons/player/volume.svg" alt="volume">
        </div>

        <div class="advanced-player-icons">
            <div class="wrapper-icons">
                <img src="./assets/img/icons/hearth.svg" alt="heart icon">
                <img src="./assets/img/icons/player/add_playlist.svg" alt="add play list icon">
            </div>
            <img src="./assets/img/icons/player/list.svg" alt="list icon">
            <img src="./assets/img/icons/player/devices.svg" alt="devices icon">
            <img src="./assets/img/icons/dots.svg" alt="dots icon">
            <hr>
            <img src="./assets/img/icons/player/player_blue_icon.svg" alt="blue icon">
            <img src="./assets/img/icons/player/order.svg" alt="order icon">
        </div>
    </footer>
    <nav class="bottom-nav">
        Bottom Nav mobile
    </nav>
</body>
</html>
