<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="MPG Team">
    <meta name="description" content="This is Georgian Spotify Template created by MPG Team">
    <link rel="stylesheet" href="assets/styles/style.css">
    <title>Georgian Spotify - Project by MPG Team</title>
</head>
<body class="app">
    <header class="header">
        Header
    </header>
    <aside class="sidebar">
        Sidebar
    </aside>
    <main class="main">
        <div class="main-inner">
            <section class="section">Sections here</section>
            <section class="section">Sections here</section>

    <div class="mini-player">
        <div class="mini-player-wrapper">

            <div class="music-title-author-wrapper">

    <nav class="bottom-nav">
