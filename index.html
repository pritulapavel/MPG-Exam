<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="MPG Team" />
    <meta
      name="description"
      content="This is Georgian Spotify Template created by MPG Team"
    />
    <link rel="stylesheet" href="assets/styles/style.css" />
    <title>Georgian Spotify - Project by MPG Team</title>
  </head>
  <body class="app">
    <header class="header">
      <div class="header-wrapper">
        <!-- Mobile navigation-->
        <nav class="navigation bottom-nav">
          <ul class="nav-ul">
            <li class="nav-item home active">
              <img src="./assets/img/icons/home.svg" alt="Home page" />
              <span>Home</span>
            </li>
            <li class="nav-item discover">
              <img src="./assets/img/icons/discover.svg" alt="Discover" />
              <span>Discover</span>
            </li>
            <li class="nav-item search">
              <img src="./assets/img/icons/search.svg" alt="Search" />
              <span>Search</span>
            </li>
            <li class="nav-item library">
              <img src="./assets/img/icons/library.svg" alt="Library" />
              <span>Library</span>
            </li>
            <li class="nav-item me">
              <img src="./assets/img/icons/me.svg" alt="My Profile" />
              <span>Me</span>
            </li>
          </ul>
        </nav>
        <!-- Desktop nav     -->
        <div class="nav-container">
          <nav class="side-nav top-nav">
            <ul class="top-nav-ul">
              <li>
                <img src="./assets/img/icons/library.svg" alt="Library" />
                <span>My library</span>
              </li>
              <li>
                <img src="./assets/img/icons/home.svg" alt="Home page" />
                <span>Home</span>
              </li>
              <li>
                <img src="./assets/img/icons/discover.svg" alt="Discover" />
                <span>Discover</span>
              </li>
              <li>
                <img src="./assets/img/icons/search.svg" alt="Search" />
                <span>Search</span>
              </li>
            </ul>
          </nav>
          <nav class="side-nav top-nav">
            <ul class="top-nav-ul right-nav">
              <li>
                <img
                  src="./assets/img/icons/notification.svg"
                  alt="Notifications"
                />
              </li>
              <li>
                <img src="./assets/img/icons/lock.svg" alt="Lock" />
              </li>
              <li>
                <img src="./assets/img/icons/users.svg" alt="Profile" />
              </li>
              <li>
                <img src="./assets/img/icons/settings.svg" alt="Settings" />
              </li>
              <li>
                <img src="./assets/img/icons/user.svg" alt="Profile" />
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <aside class="sidebar">Sidebar</aside>
    <main class="main">
      <div class="main-inner">
        <section class="section">Sections here</section>
        <section class="section">Sections here</section>
      </div>
    </main>
    <div class="mini-player">Mini Player</div>
    <footer class="player">Player</footer>
    <nav class="bottom-nav">Bottom Nav mobile</nav>
  </body>
</html>
