<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="MPG Team" />
    <meta
      name="description"
      content="This is Georgian Spotify Template created by MPG Team"
    />
    <link rel="stylesheet" href="assets/styles/style.css" />
    <title>Georgian Spotify - Project by MPG Team</title>
  </head>
  <body class="app">
    <header class="header">
      <div class="header-wrapper">
        <!-- desktop -->
        <nav class="navigation">
          <ul class="top-nav-ul">
            <li>
              <a href="#">
                <div class="img-div">
                  <img
                    src="./assets/img/icons/home-inactive.svg"
                    alt="Home page"
                  />
                </div>
                <span>Home</span>
              </a>
            </li>
            <li>
              <a href="#">
                <div class="img-div">
                  <img src="./assets/img/icons/discover.svg" alt="Discover" />
                </div>
                <span>Discover</span>
              </a>
            </li>
            <li>
              <form action="">
                <div class="img-div search-wrapper">
                  <label for="search">
                    <img src="./assets/img/icons/search.svg" alt="Search" />
                  </label>
                  <input id="search" type="search" placeholder="Search" />
                </div>
              </form>
            </li>
          </ul>
        </nav>
        <nav class="side-nav top-nav">
          <ul class="top-nav-ul">
            <li>
              <a href="#">
                <img
                  src="./assets/img/icons/notification.svg"
                  alt="Notifications"
                />
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./assets/img/icons/lock.svg" alt="Lock" />
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./assets/img/icons/users.svg" alt="Profile" />
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./assets/img/icons/settings.svg" alt="Settings" />
              </a>
            </li>
            <li class="no-hover">
              <a href="#">
                <img src="./assets/img/icons/user.svg" alt="Profile" />
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <aside class="sidebar">Sidebar</aside>
    <main class="main">
      <div class="main-inner">
        <section class="section">Sections here</section>
        <section class="section">Sections here</section>
      </div>
    </main>
    <!-- <div class="mini-player">Mini Player</div> -->
    <footer class="player">Player</footer>
    <nav class="mobile-nav">
      <a href="#" class="nav-item">
        <div class="img-div">
          <img src="./assets/img/icons/home-inactive.svg" alt="Home" />
        </div>
        <span>Home</span>
      </a>
      <a href="#" class="nav-item">
        <div class="img-div">
          <img src="./assets/img/icons/discover.svg" alt="Discover" />
        </div>
        <span>Discover</span>
      </a>
      <a href="#" class="nav-item">
        <div class="img-div">
          <img src="./assets/img/icons/search.svg" alt="Search" />
        </div>
        <span>Search</span>
      </a>
      <a href="#" class="nav-item">
        <div class="img-div">
          <img src="./assets/img/icons/library.svg" alt="Library" />
        </div>
        <span>Library</span>
      </a>
      <a href="#" class="nav-item">
        <div class="img-div">
          <img src="./assets/img/icons/me.svg" alt="My Profile" />
        </div>
        <span>Me</span>
      </a>
    </nav>
  </body>
</html>
