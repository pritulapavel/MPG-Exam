<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../assets/styles/style.css" />
</head>

<body>
    <main class="main now-playing">
        <section class="navigation-title">
            <div class="icon-title-wrapper">
                <img src="../assets/img/icons/albom.svg" alt="albom icon">
                <p>Random Access Memories</p>
            </div>
        </section>

        <section class="main-content">
            <div class="main-content-wrapper">
                <img src="../assets/img/albums/album_1.png" alt="Daft Punk image">

                <div class="main-info-wrapper">
                    <div class="music-author-wrapper">
                        <div class="title-marquee">
                            <p>Get Lucky (feat. Pharrell Williams and Nile Rodgers)</p>
                        </div>
                        <p class="artist-name">Daft Punk</p>
                    </div>
                    <div class="icon-wrapper">
                        <img src="../assets/img/icons/hearth.svg" alt="hearth icon">
                        <img src="../assets/img/icons/add.svg" alt="add music icon">
                    </div>
                </div>
            </div>
        </section>

        <section class="music-player">
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill">
                        <div class="progress-dot"></div>
                    </div>
                </div>
                <div class="time-labels">
                    <p>2:23</p>
                    <p>-0:45</p>
                </div>
            </div>

            <div class="music-navigation">
                <img src="../assets/img/icons/player/shuffle.svg" alt="shuffle icon">
                <div class="main-music-navigation">
                    <img src="../assets/img/icons/player/prev.svg" alt="prev icon">
                    <div class="pause-wrapper">
                        <img src="../assets/img/icons/player/pause.svg" alt="pause icon">
                    </div>
                    <img src="../assets/img/icons/player/next.svg" alt="next icon">
                </div>
                <img src="../assets/img/icons/player/repeat.svg" alt="repeat icon">
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-icon-wrapper">
            <div class="nav-icon">
                <a href="now-playing.html"><img src="../assets/img/icons/player/devices.svg" alt="devices icon"></a>
            </div>
            <div class="nav-icon">
                <img src="../assets/img/icons/upload.svg" alt="upload icon">
            </div>
            <div class="nav-icon active">
                <a href="now-playing-text.html">
                    <img src="../assets/img/icons/list.svg" alt="list icon">
                </a>
            </div>
            <div class="nav-icon">
                <a href="now-playing-music-section.html"> <img src="../assets/img/icons/player/order.svg"
                        alt="order icon">
            </div></a>
            <div class="nav-icon">
                <img src="../assets/img/icons/dots.svg" alt="dots icon">
            </div>
        </div>
    </footer>
</body>

</html>
